version: "1"

metadata:
  title: "Dynamics 365 CRM Sync Engine - Scoring Rubric"
  description: "Rubric for evaluating Lead .NET Developer with Dynamics 365 expertise"

dimensions:
  - name: "Architecture & Design"
    weight: 0.25
    description: "How well the candidate structures code, applies SOLID principles, and makes design decisions befitting a lead engineer"
    weight: 0.20
    description: "How well the candidate structures code, applies SOLID principles, and makes design decisions"
    anchors:
      1:
        description: "Dumps all logic into a single class with no separation of concerns"
        examples:
          - "All mapping, sync, and conflict logic in one file"
          - "No dependency injection or interface usage"
          - "Tightly coupled components"
      2:
        description: "Basic separation but inconsistent patterns"
        examples:
          - "Some classes separated but unclear responsibilities"
          - "Mixes concerns within methods"
          - "Partial use of provided interfaces"
      3:
        description: "Clean separation with proper DI and consistent patterns"
        examples:
          - "Implements all interfaces with clear single responsibilities"
          - "Constructor injection for dependencies"
          - "Consistent naming and organization"
      4:
        description: "Exemplary architecture showing lead-level judgment"
        examples:
          - "Strategic use of patterns (strategy for conflict, mapper for transforms)"
          - "Error handling that respects failure boundaries"
          - "Code structured for testability and extensibility without over-engineering"

  - name: "AI Collaboration Quality"
    weight: 0.10
    description: "Quality of prompts and how effectively the candidate steers the AI for implementation"
    anchors:
      1:
        description: "Vague prompts that delegate all decisions to AI"
        examples:
          - "'Build the sync engine' with no context"
          - "No guidance on architecture or patterns"
          - "Accepts whatever AI generates without direction"
      2:
        description: "Provides some context but lets AI make key design decisions"
        examples:
          - "Shares interfaces but doesn't specify approach"
          - "Doesn't correct when AI takes a wrong architectural direction"
      3:
        description: "Provides clear context and guides AI on approach"
        examples:
          - "Shares relevant model files and test expectations"
          - "Specifies which pattern to use for conflict resolution"
          - "Breaks work into focused prompts per phase"
      4:
        description: "Expert AI collaboration — uses AI as a force multiplier"
        examples:
          - "Describes architecture up front, delegates implementation"
          - "Uses AI for boilerplate mapping while making design calls personally"
          - "Iteratively refines with targeted follow-up prompts"

  - name: "Dynamics 365 Knowledge"
    weight: 0.25
    description: "Expertise in Dynamics-specific technical components (Plugins, PCF) and platform conventions"
    anchors:
      1:
        description: "No recognition of Dynamics patterns — treats as generic data models"
        examples:
          - "Ignores StateCode/StatusCode semantics"
          - "Doesn't understand Plugin context or Organization Service"
          - "Fails to implement most basic PCF logic"
      2:
        description: "Basic awareness but gaps in implementation"
        examples:
          - "Implements Plugin but misses InputParameters (Target) or Stage check"
          - "PCF logic is partially correct but ignores timezone/UTC considerations"
          - "Uses generic repo instead of OrganizationService in Plugin"
      3:
        description: "Solid implementation of Dynamics components"
        examples:
          - "Correctly implements AccountLinkPlugin using IPluginExecutionContext"
          - "Uses OrganizationService for updates within the Plugin"
          - "PCF logic correctly handles nulls and today's date comparison"
      4:
        description: "Deep expertise — handles complex platform scenarios"
        examples:
          - "Handles concurrency (VersionNumber) and defensive checks in Plugin"
          - "PCF implementation is robust, clean, and handles UTC edge cases"
          - "Understands the Post-Operation stage vs Pre-Operation trade-offs"

  - name: "AI Output Evaluation"
    weight: 0.15
    description: "How critically the candidate reviews and refines AI-generated code"
    anchors:
      1:
        description: "Blindly accepts all AI output"
        examples:
          - "Applies AI suggestions without reading the code"
          - "Doesn't catch incorrect mapping logic"
      2:
        description: "Minimal review — catches obvious errors only"
        examples:
          - "Fixes compile errors but not logic bugs"
          - "Doesn't verify mapping correctness against the spec"
      3:
        description: "Reviews AI output and catches mapping/logic issues"
        examples:
          - "Verifies field mappings against the README table"
          - "Catches incorrect status mapping or name splitting"
      4:
        description: "Thorough review with improvements"
        examples:
          - "Catches edge cases AI missed (single name, null fields)"
          - "Improves AI's implementation with better error handling"
          - "Refactors AI code for consistency with the rest of the codebase"

  - name: "Verification Discipline"
    weight: 0.10
    description: "Use of tests to drive implementation and verify correctness"
    anchors:
      1:
        description: "Writes all code then runs tests once at the end"
      2:
        description: "Runs tests occasionally but not strategically"
      3:
        description: "Runs phase-specific tests after each implementation phase"
        examples:
          - "Uses --filter to run Phase1 tests first"
          - "Iterates on failures before moving to next phase"
      4:
        description: "Test-driven approach — runs tests frequently and uses output to guide implementation"
        examples:
          - "Reads test code first to understand requirements"
          - "Runs specific tests to validate each piece"

  - name: "Code Quality"
    weight: 0.15
    description: "Quality of the C# and TypeScript code produced"
    anchors:
      1:
        description: "Code compiles but is messy or fragile"
        examples:
          - "Magic strings/numbers everywhere"
          - "No null checks where needed"
          - "Inconsistent naming"
      2:
        description: "Functional but not clean"
        examples:
          - "Works but has code smells"
          - "Inconsistent patterns across files"
      3:
        description: "Clean, idiomatic C# with proper patterns"
        examples:
          - "Good use of nullable reference types"
          - "Consistent style and naming"
          - "Appropriate exception handling"
      4:
        description: "Production-quality code"
        examples:
          - "Defensive coding without over-engineering"
          - "Clear variable names and method signatures"
          - "Appropriate use of modern C# features"

  - name: "Communication"
    weight: 0.05
    description: "Clarity of explanations in AI conversations and code comments"
    anchors:
      1:
        description: "No explanations or rationale for decisions"
      2:
        description: "Minimal communication"
      3:
        description: "Clear explanations of approach and decisions"
      4:
        description: "Articulates trade-offs and design rationale"

success_criteria:
  - "Phase 1 tests pass (8 tests) — Mapping & Sync"
  - "Phase 2 tests pass (5 tests) — Conflict Resolution"
  - "Phase 3 tests pass — Dynamics Plugin implementation"
  - "Phase 5 logic implemented — PCF component"
  - "Code compiles without errors"
  - "No pre-built files are modified"

passing_score: 0.70
